name: metro_yar
description: "MetroYar — Tehran Metro route planner, station explorer & metro map viewer."
publish_to: 'none'

# Build number bumped as part of the architectural overhaul (BLoC + core/shared/features).
version: 2.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State management ────────────────────────────────────────────────────
  flutter_bloc: ^8.1.6      # Bloc / Cubit
  equatable: ^2.0.7          # Value equality for states & events

  # ── Dependency injection ────────────────────────────────────────────────
  get_it: ^7.7.0

  # ── Persistence ──────────────────────────────────────────────────────────
  shared_preferences: ^2.3.3 # Theme + onboarding flag
  sqflite: ^2.4.1            # metro.db (stations / lines / connections)
  sqflite_common_ffi: ^2.3.4 # Desktop (Windows / Linux / macOS) sqflite backend
  path_provider: ^2.1.5
  path: ^1.9.0

  # ── Location ─────────────────────────────────────────────────────────────
  geolocator: ^14.0.3  # "Use my location" → nearest station

  # ── Graphics / map ───────────────────────────────────────────────────────
  flutter_svg: ^2.3.0     # Tehran metro SVG map
  flutter_map: ^7.0.2     # Interactive OpenStreetMap picker ("pick on map")
  latlong2: ^0.9.1        # LatLng type used by flutter_map

  # ── Misc ─────────────────────────────────────────────────────────────────
  package_info_plus: ^10.2.0
  url_launcher: ^6.3.1        # "Open in Maps" from station details
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/metro.db
    - assets/schedules/train_schedule_1.json
    - assets/schedules/train_schedule_2.json
    - assets/schedules/train_schedule_3.json
    - assets/schedules/train_schedule_4.json
    - assets/schedules/train_schedule_5.json
    - assets/schedules/train_schedule_6.json
    - assets/schedules/train_schedule_7.json
    - images/tehran-subway.svg

  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Thin.ttf
          weight: 100
        - asset: assets/fonts/Vazirmatn-Light.ttf
          weight: 300
        - asset: assets/fonts/Vazirmatn-Regular.ttf
          weight: 400
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/fonts/Vazirmatn-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Vazirmatn-Black.ttf
          weight: 900
